server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    if ($host ~* ^artryazanov\.(com|ru)$) {
        return 301 https://www.$host$request_uri;
    }

    location /up {
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    location / {
        ssi on;
        try_files $uri $uri/ =404;
    }
}
